<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>かけいのりこ｜おすすめの家計改善ツール</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
         background: #fff; color: #111; max-width: 480px; margin: 0 auto; }

  .profile { padding: 40px 24px 28px; border-bottom: 1px solid #f0f0f0; }
  .profile-inner { display: flex; align-items: center; gap: 16px; }
  .avatar { width: 56px; height: 56px; border-radius: 50%;
            background: #e8f5e9; display: flex; align-items: center;
            justify-content: center; font-size: 24px; flex-shrink: 0;
            border: 1px solid #c8e6c9; }
  .profile-text h1 { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .profile-text p { font-size: 13px; color: #666; line-height: 1.5; }

  .note { margin: 20px 24px 0; padding: 14px 16px; background: #f9f9f9;
          border-radius: 8px; font-size: 13px; color: #555; line-height: 1.6; }

  .section { padding: 24px 24px 0; }
  .section-label { font-size: 11px; color: #999; letter-spacing: 0.08em;
                   text-transform: uppercase; margin-bottom: 16px; }

  .product-card { border: 1px solid #e8e8e8; border-radius: 12px;
                  padding: 18px; margin-bottom: 12px; }
  .product-header { display: flex; justify-content: space-between;
                    align-items: flex-start; margin-bottom: 8px; }
  .product-name { font-size: 15px; font-weight: 600; }
  .product-tag { font-size: 11px; color: #2e7d32; font-weight: 500;
                 background: #e8f5e9; padding: 2px 8px; border-radius: 20px; }
  .product-desc { font-size: 13px; color: #666; line-height: 1.6;
                  margin-bottom: 14px; }
  .btn { display: block; border: 1.5px solid #2e7d32; color: #2e7d32;
         text-align: center; padding: 11px; border-radius: 8px;
         font-size: 13px; font-weight: 500; text-decoration: none; }
  .btn:hover { background: #f1f8f1; }
  .btn-disabled { border-color: #ddd; color: #bbb; cursor: default; }

  .footer { padding: 32px 24px; font-size: 11px; color: #bbb;
            border-top: 1px solid #f0f0f0; margin-top: 24px; line-height: 1.7; }
</style>
</head>
<body>

<div class="profile">
  <div class="profile-inner">
    <div class="avatar">🌱</div>
    <div class="profile-text">
      <h1>かけいのりこ</h1>
      <p>元銀行員・FP2級保有の主婦<br>貯金ゼロから年100万節約を達成</p>
    </div>
  </div>
</div>

<div class="note">
  NISAやポイ活、情報が多くて何から始めればいいかわからない方へ。私が実際に使っていて「これだけでいい」と思うものだけまとめました。
</div>

<div class="section" style="padding-top:24px;">
  <div class="section-label">のりこのおすすめ</div>
  <div id="product-list"></div>
</div>

<div class="footer">
  かけいのりこ — Threads @noriko_finance<br>
  ※ページ内のリンクはアフィリエイトリンクを含みます<br>
  ※投資は元本保証ではありません。ご自身の判断でご利用ください
</div>

<script src="noriko_data.js"></script>
<script>
  if (typeof PRODUCT_LIST !== 'undefined' && PRODUCT_LIST.length > 0) {
    var container = document.getElementById('product-list');
    PRODUCT_LIST.forEach(function(p) {
      var hasUrl = p.url && p.url.length > 0;
      var card = document.createElement('div');
      card.className = 'product-card';
      card.innerHTML =
        '<div class="product-header">' +
          '<div class="product-name">' + p.name + '</div>' +
          '<span class="product-tag">' + p.badge + '</span>' +
        '</div>' +
        '<div class="product-desc">' + p.description + '</div>' +
        (hasUrl
          ? '<a class="btn" href="' + p.url + '" target="_blank">詳しくはこちら</a>'
          : '<div class="btn btn-disabled">準備中</div>');
      container.appendChild(card);
    });
  }
</script>
</body>
</html>
