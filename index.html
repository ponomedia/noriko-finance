<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>かけいのりこ｜迷ったらこれだけ。家計を変える2ステップ</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
         background: #f4f9f4; color: #2a3a2a; }

  .hero { background: linear-gradient(135deg, #3a7d44 0%, #1e4d28 100%);
          color: white; text-align: center; padding: 40px 20px 30px; }
  .hero .avatar { width: 80px; height: 80px; border-radius: 50%;
                  border: 3px solid rgba(255,255,255,0.6);
                  background: #4a9d54; display: inline-flex;
                  align-items: center; justify-content: center;
                  font-size: 32px; margin-bottom: 12px; }
  .hero h1 { font-size: 20px; font-weight: bold; margin-bottom: 6px; }
  .hero p { font-size: 13px; opacity: 0.9; line-height: 1.7; }

  .catch { background: #fff9e6; border-left: 4px solid #f5a623;
           margin: 20px 16px 0; padding: 14px 16px; border-radius: 8px; }
  .catch p { font-size: 14px; line-height: 1.7; color: #5a4a1a; }
  .catch strong { color: #c07000; }

  .section { padding: 20px 16px 8px; }
  .section-title { font-size: 13px; color: #5a8a5a; font-weight: bold;
                   letter-spacing: 0.05em; margin-bottom: 14px; }

  .product-card { background: white; border-radius: 18px;
                  overflow: hidden; box-shadow: 0 2px 14px rgba(40,100,50,0.10);
                  margin-bottom: 18px; border: 1px solid #d4e8d4; }
  .card-header { display: flex; align-items: center; gap: 12px;
                 padding: 16px 16px 0; }
  .step-badge { width: 40px; height: 40px; border-radius: 50%;
                background: linear-gradient(135deg, #3a7d44, #1e4d28);
                color: white; display: flex; align-items: center;
                justify-content: center; font-size: 18px; font-weight: bold;
                flex-shrink: 0; }
  .badge-wrap { display: flex; flex-direction: column; }
  .product-badge { display: inline-block; background: #e8f5e9; color: #2e7d32;
                   font-size: 11px; font-weight: bold; padding: 2px 8px;
                   border-radius: 20px; margin-bottom: 4px; width: fit-content; }
  .product-name { font-size: 17px; font-weight: bold; color: #1a2a1a; }
  .product-body { padding: 12px 16px 16px; }
  .product-desc { font-size: 13px; color: #5a7a5a; line-height: 1.7;
                  margin-bottom: 14px; }
  .btn-product { display: block; background: linear-gradient(135deg, #3a7d44, #1e4d28);
                 color: white; text-align: center; padding: 14px;
                 border-radius: 12px; font-size: 15px; font-weight: bold;
                 text-decoration: none; letter-spacing: 0.03em; }
  .btn-product:hover { opacity: 0.9; }
  .btn-disabled { background: #c0c0c0; cursor: default; }

  .note { text-align: center; font-size: 12px; color: #8aaa8a;
          margin: 8px 16px 0; line-height: 1.6; }

  .footer { text-align: center; padding: 28px 16px; font-size: 11px;
            color: #8aaa8a; line-height: 1.8;
            border-top: 1px solid #d4e8d4; margin-top: 16px; }
</style>
</head>
<body>

<div class="hero">
  <div class="avatar">🌱</div>
  <h1>かけいのりこ｜元銀行員・FP2級</h1>
  <p>貯金ゼロ→年間100万節約を達成した主婦<br>お金は才能じゃなく仕組みで変わる</p>
</div>

<div class="catch">
  <p>「NISAとかポイ活とか、<strong>情報が多すぎて何をすればいいかわからない</strong>」<br>
  そういう方に向けて、<strong>これだけやればOK</strong>という2つを厳選しました。</p>
</div>

<div class="section">
  <div class="section-title">💰 のりこが本気でおすすめする2ステップ</div>
  <div id="product-list"></div>
</div>

<div class="note">
  ※ リンクはアフィリエイトリンクを含みます<br>
  ※ 投資は元本保証ではありません。ご自身の判断で行ってください
</div>

<div class="footer">
  かけいのりこ — 家計を救うFPの卵<br>
  Threads: @noriko_finance
</div>

<script src="noriko_data.js"></script>
<script>
  if (typeof PRODUCT_LIST !== 'undefined' && PRODUCT_LIST.length > 0) {
    var container = document.getElementById('product-list');
    PRODUCT_LIST.forEach(function(p) {
      var hasUrl = p.url && p.url.length > 0;
      var card = document.createElement('div');
      card.className = 'product-card';
      card.innerHTML =
        '<div class="card-header">' +
          '<div class="step-badge">STEP<br>' + p.step + '</div>' +
          '<div class="badge-wrap">' +
            '<span class="product-badge">' + p.badge + '</span>' +
            '<div class="product-name">' + p.name + '</div>' +
          '</div>' +
        '</div>' +
        '<div class="product-body">' +
          '<div class="product-desc">' + p.description + '</div>' +
          (hasUrl
            ? '<a class="btn-product" href="' + p.url + '" target="_blank">🌱 詳しくはこちら</a>'
            : '<div class="btn-product btn-disabled">準備中</div>') +
        '</div>';
      container.appendChild(card);
    });
  }
</script>
</body>
</html>
